<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karya - Metode Pembayaran</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script>
tailwind.config={theme:{extend:{fontFamily:{sans:['Plus Jakarta Sans','sans-serif']},colors:{cream:'#f8f7f3',royal:'#5a74f6',dark:'#1a1a2e'}}}}
</script>
<style>
html, body { width: 1312px !important; min-height: 2550px !important; margin: 0 auto; background: #f8f7f3; overflow-x: hidden; }
.glass{background:rgba(248,247,243,.85);backdrop-filter:blur(12px);border-bottom:1px solid rgba(0,0,0,.05)}
</style>
</head>
<body class="text-gray-800 antialiased">

<nav class="fixed top-0 w-full glass z-50">
    <div class="max-w-[1312px] mx-auto px-6 h-20 flex items-center justify-between">
        <div class="text-3xl font-extrabold text-royal tracking-tighter">Karya.id</div>
        <div class="flex items-center space-x-4">
            <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-royal to-lavender text-white flex items-center justify-center font-bold shadow-sm ring-2 ring-white border border-gray-100">A</div>
        </div>
    </div>
</nav>

<div class="max-w-[1312px] mx-auto px-6 pt-32 pb-20">
    <h1 class="text-[32px] font-extrabold text-dark tracking-tight mb-8">Pengaturan Akun</h1>
    
    <div class="flex gap-8">
        <div class="w-1/4">
            <div class="bg-white rounded-[24px] border border-gray-100 p-4 shadow-sm flex flex-col gap-2">
                <button class="text-left px-5 py-3 rounded-xl text-gray-500 font-bold text-sm hover:bg-gray-50 transition-colors">Profil Publik</button>
                <button class="text-left px-5 py-3 rounded-xl text-gray-500 font-bold text-sm hover:bg-gray-50 transition-colors">Keamanan & Password</button>
                <button class="text-left px-5 py-3 rounded-xl text-gray-500 font-bold text-sm hover:bg-gray-50 transition-colors">Notifikasi</button>
                <button class="text-left px-5 py-3 rounded-xl bg-royal text-white font-bold text-sm shadow-md shadow-royal/20">Metode Pembayaran</button>
            </div>
        </div>

        <div class="w-3/4 bg-white rounded-[32px] border border-gray-100 p-8 shadow-sm">
            <h2 class="text-xl font-extrabold text-dark mb-6">Metode Pembayaran Tersimpan</h2>
            <div class="space-y-4 mb-8">
                
                <div class="flex items-center justify-between p-6 bg-gray-50 rounded-2xl border border-gray-200 shadow-sm">
                    <div class="flex items-center gap-5">
                        <div class="w-14 h-10 bg-blue-600 rounded-lg flex items-center justify-center text-white font-bold text-sm tracking-widest shadow-sm">BCA</div>
                        <div>
                            <div class="flex items-center gap-3 mb-1">
                                <p class="font-bold text-dark text-[15px]">Bank BCA</p>
                                <span class="px-2.5 py-0.5 bg-green-100 text-green-700 text-[10px] font-extrabold rounded-md uppercase tracking-wider">Utama</span>
                            </div>
                            <p class="text-sm text-gray-500">**** **** **** 1234</p>
                        </div>
                    </div>
                    <button class="text-sm font-bold text-gray-400 hover:text-dark transition-colors">Edit</button>
                </div>

                <div class="flex items-center justify-between p-6 bg-gray-50 rounded-2xl border border-gray-100">
                    <div class="flex items-center gap-5">
                        <div class="w-14 h-10 bg-[#4C3494] rounded-lg flex items-center justify-center text-white font-bold text-sm tracking-widest shadow-sm">OVO</div>
                        <div>
                            <p class="font-bold text-dark text-[15px] mb-1">OVO Wallet</p>
                            <p class="text-sm text-gray-500">0812-****-7890</p>
                        </div>
                    </div>
                    <button class="text-sm font-bold text-red-500 hover:text-red-700 transition-colors">Hapus</button>
                </div>

            </div>

            <button class="w-full py-5 border-2 border-dashed border-gray-300 rounded-2xl text-gray-500 font-bold hover:border-royal hover:text-royal hover:bg-royal/5 transition-all flex items-center justify-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"/></svg> Tambah Metode Pembayaran Baru
            </button>

            <div class="mt-8 p-5 bg-blue-50/50 rounded-2xl border border-blue-100 flex items-start gap-3">
                <svg class="w-5 h-5 text-blue-500 mt-0.5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                <div>
                    <p class="text-[13px] text-gray-600 leading-relaxed">Metode pembayaran utama akan digunakan secara otomatis saat Anda melakukan top-up atau pembayaran proyek. Data kartu atau E-Wallet Anda dienkripsi secara aman.</p>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
