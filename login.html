<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karya - Masuk</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script>
tailwind.config={theme:{extend:{fontFamily:{sans:['Plus Jakarta Sans','sans-serif']},colors:{cream:'#f8f7f3',paleyellow:'#ffffdb',lavender:'#94a4f6',royal:'#5a74f6',dark:'#1a1a2e'},boxShadow:{'card':'0 12px 32px -12px rgba(90,116,246,0.1)','card-hover':'0 20px 40px -10px rgba(90,116,246,0.2)','glow':'0 0 20px rgba(90,116,246,0.4)'}}}}
</script>
<style>
/* --- FORCED FIGMA DIMENSIONS --- */
html, body {
    width: 1312px !important;
    min-height: 2550px !important;
    margin: 0 auto;
    background: #f8f7f3;
    overflow-x: hidden;
}
/* ------------------------------- */

.bg-mesh{background-image:radial-gradient(at 80% 0%,hsla(230,89%,84%,.4) 0,transparent 50%),radial-gradient(at 0% 50%,hsla(60,100%,86%,.4) 0,transparent 50%)}
</style>
</head>
<body class="text-gray-800 antialiased bg-mesh">

<div class="w-full pt-32 pb-16 flex justify-center">
    <div class="w-full max-w-[480px] px-6">
        
        <div class="text-center mb-10">
            <div class="text-4xl font-extrabold text-royal tracking-tighter mb-2">Karya.id</div>
            <p class="text-gray-500 text-sm">Platform Freelance Marketplace Indonesia</p>
        </div>

        <div class="bg-white rounded-[32px] border border-gray-100 shadow-card p-10">
            
            <div class="flex bg-gray-100 rounded-2xl p-1 mb-8">
                <button class="bg-royal text-white shadow-md flex-1 py-3 rounded-xl text-sm font-extrabold transition-all">Masuk</button>
                <button class="text-gray-500 flex-1 py-3 rounded-xl text-sm font-extrabold transition-all">Daftar</button>
            </div>

            <div class="space-y-5">
                <div>
                    <label class="text-sm font-bold text-gray-600 block mb-2">Email</label>
                    <div class="relative">
                        <svg class="w-5 h-5 text-gray-400 absolute left-4 top-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
                        <input type="email" placeholder="nama@email.com" class="w-full bg-gray-50 border border-gray-200 rounded-2xl py-3.5 pl-12 pr-4 text-sm font-medium focus:outline-none focus:border-royal focus:ring-4 focus:ring-royal/10 transition-all">
                    </div>
                </div>
                <div>
                    <label class="text-sm font-bold text-gray-600 block mb-2">Password</label>
                    <div class="relative">
                        <svg class="w-5 h-5 text-gray-400 absolute left-4 top-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
                        <input type="password" placeholder="••••••••" class="w-full bg-gray-50 border border-gray-200 rounded-2xl py-3.5 pl-12 pr-4 text-sm font-medium focus:outline-none focus:border-royal focus:ring-4 focus:ring-royal/10 transition-all">
                    </div>
                </div>
                <div class="flex items-center justify-between">
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" class="w-4 h-4 rounded border-gray-300 text-royal focus:ring-royal">
                        <span class="text-sm text-gray-500">Ingat saya</span>
                    </label>
                    <a href="#" class="text-sm text-royal font-semibold hover:underline">Lupa password?</a>
                </div>
                <button class="w-full py-4 bg-royal text-white rounded-2xl font-extrabold shadow-lg shadow-royal/30 hover:-translate-y-0.5 hover:shadow-glow transition-all">Masuk</button>
            </div>

            <div class="mt-8">
                <div class="flex items-center gap-4 mb-6">
                    <div class="flex-1 h-px bg-gray-200"></div>
                    <span class="text-xs text-gray-400 font-semibold">atau masuk dengan</span>
                    <div class="flex-1 h-px bg-gray-200"></div>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <button class="flex items-center justify-center gap-2 py-3 bg-white border border-gray-200 rounded-2xl text-sm font-bold text-gray-700 hover:bg-gray-50 transition-all">
                        <svg class="w-5 h-5" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                        Google
                    </button>
                    <button class="flex items-center justify-center gap-2 py-3 bg-white border border-gray-200 rounded-2xl text-sm font-bold text-gray-700 hover:bg-gray-50 transition-all">
                        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
                        GitHub
                    </button>
                </div>
            </div>

        </div>

        <p class="text-center text-sm text-gray-400 mt-6">Belum punya akun? <a href="#" class="text-royal font-semibold hover:underline">Daftar gratis</a></p>
    </div>
</div>

</body>
</html>
